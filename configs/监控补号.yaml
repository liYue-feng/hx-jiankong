# 监控补号模式 - 华医通
# 从微信入口开始，自动导航到医生详情页，监控号源并自动挂号
name: "监控补号"
mode: monitor
description: "从微信入口开始导航到医生详情页，发现预约按钮后自动挂号"
patient: ""
department: ""
doctor: ""
sct_key: "YOUR_SERVERCHAN_KEY_HERE"
yunma_token: "YOUR_YUNMA_TOKEN_HERE"
max_ocr_retry: 20

schedule:
  night_start: 1
  night_end: 6
  refresh_min: 30
  refresh_max: 180
  session_timeout: 15

recovery:
  - action: goto
    desc: "超时恢复，回到入口"
    params:
      label: "entry"

on_success:
  - action: capture
    desc: "截图支付页面"
    params:
      save: "screenshots/payment_success.png"
  - action: notify
    desc: "抢号成功通知"
    params:
      title: "监控补号成功!"
      body: "已锁号，请立即支付"
      urgent: "true"

steps:
  # ====== 入口导航 ======
  - action: wait
    desc: "entry"
    timeout: 1

  - action: find_click
    desc: "点击诊疗服务"
    image: "png/诊疗服务按钮.png"
    match_threshold: 0.75
    x: 100
    y: 200
    wait_after: 3

  - action: find_click
    desc: "点击预约挂号"
    image: "png/预约挂号按钮.png"
    match_threshold: 0.7
    x: 100
    y: 300
    wait_after: 3

  - action: find_click
    desc: "选择就诊人"
    image: "png/就诊卡.png"
    match_threshold: 0.7
    x: 100
    y: 300
    wait_after: 2

  - action: find_click
    desc: "勾选挂号须知"
    image: "png/挂号须知.png"
    match_threshold: 0.75
    x: 100
    y: 400
    wait_after: 1

  - action: find_click
    desc: "确认须知"
    image: "png/确认须知.png"
    match_threshold: 0.7
    x: 200
    y: 500
    wait_after: 3

  # ====== 搜索医生 ======
  - action: find_click
    desc: "点击搜索栏"
    image: "png/搜索栏.png"
    match_threshold: 0.7
    x: 200
    y: 50
    wait_after: 2

  - action: type_text
    desc: "输入医生名字"
    params:
      text: "{{doctor}}"
    wait_after: 1

  - action: find_click
    desc: "点搜索按钮"
    image: "png/搜索按钮.png"
    match_threshold: 0.7
    x: 300
    y: 100
    wait_after: 3

  - action: ensure_page
    desc: "确保在医生列表页"
    params:
      target: "list"

  # ====== 监控循环 ======
  - action: loop_start
    desc: "监控循环"

  - action: random_wait
    desc: "在列表页等待"
    interval:
      min: 30
      max: 180

  - action: click
    desc: "点击医生卡片"
    x: 340
    y: 335
    wait_after: 3

  - action: ensure_page
    desc: "确认进入医生详情页"
    params:
      target: "detail"

  # ====== 检测预约按钮 → 挂号流程 ======
  - action: find_click
    desc: "检测预约按钮"
    image: "png/预约.png"
    region: [18, 294, 383, 775]
    match_threshold: 0.7
    x: 200
    y: 310
    on_found:
      message: "发现号源!"
      notify_user: true
      steps:
        - action: wait
          desc: "等待确认预约页面"
          timeout: 2

        # 点击确认预约
        - action: find_click
          desc: "点击确认预约"
          image: "png/确认预约.png"
          match_threshold: 0.7
          x: 200
          y: 400
          wait_after: 2

        # ====== 验证码阶段 ======
        - action: notify
          desc: "进入验证码阶段"
          params:
            title: "验证码已出现"
            body: "正在自动识别..."
            urgent: "true"

        - action: capture
          desc: "截图验证码"
          params:
            save: "screenshots/captcha.png"

        - action: find_click
          desc: "点击验证码输入框"
          image: "png/验证码_输入区域.png"
          match_threshold: 0.7
          x: 200
          y: 340
          wait_after: 1

        - action: captcha
          desc: "识别验证码并输入"
          region: [100, 250, 300, 400]
          x: 200
          y: 340
          params:
            confirm_x: "200"
            confirm_y: "450"

        - action: find_click
          desc: "点击确认"
          image: "png/验证码_确认.png"
          match_threshold: 0.7
          x: 200
          y: 450
          wait_after: 3

        - action: ocr_check
          desc: "检查是否进入支付页"
          region: [50, 50, 350, 550]
          keywords: ["支付", "确认支付", "锁号", "微信支付"]
          on_found:
            message: "挂号成功!"
            notify_user: true
            steps:
              - action: success
          on_not_found:
            steps:
              - action: ocr_check
                desc: "检查错误提示"
                region: [50, 200, 350, 450]
                keywords: ["接口错误", "接口异常", "网络失败", "没有号", "已约满", "繁忙"]
                on_found:
                  message: "抢号失败，继续监控"
                  steps:
                    - action: wait
                      timeout: 1
                    - action: goto
                      params:
                        label: "监控循环"
                on_not_found:
                  steps:
                    - action: captcha_retry
                      desc: "重试验证码"
                      region: [100, 250, 300, 400]
                      x: 200
                      y: 340
                      params:
                        confirm_x: "200"
                        confirm_y: "450"

    on_not_found:
      message: "未发现预约按钮，返回列表页"
      steps:
        - action: click
          desc: "返回列表"
          x: 20
          y: 40
          wait_after: 2
      loop: false

  - action: ensure_page
    desc: "确认回到医生列表页"
    params:
      target: "list"

  - action: loop_end
    desc: "回到循环起点"

app_config:
  back_button:
    x: 20
    y: 40
  search_button:
    x: 358
    y: 92
  schedule_region: [18, 294, 383, 775]
  title_region: [0, 0, 400, 100]
  miniapp_title: "微信"
  ocr:
    language: "chi_sim"
    psm: 6
